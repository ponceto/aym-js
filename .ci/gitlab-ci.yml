# ----------------------------------------------------------------------------
# default
# ----------------------------------------------------------------------------

default:
  image: debian:stable

# ----------------------------------------------------------------------------
# stages
# ----------------------------------------------------------------------------

stages:
  - build-and-deploy

# ----------------------------------------------------------------------------
# build and deploy website
# ----------------------------------------------------------------------------

build-and-deploy-website:
  stage: build-and-deploy
  tags:
    - docker
    - amd64
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  before_script:
    - ./.ci/ci-setup-debian.sh
  script:
    - ./.ci/ci-build-website.sh
    - ./.ci/ci-deploy-website.sh

# ----------------------------------------------------------------------------
# End-Of-File
# ----------------------------------------------------------------------------
